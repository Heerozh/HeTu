name: Build and Push Docker hub

on:
  push:
    tags:
      - v**
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 20 * * *' # 每天 北京时间 04:00 运行一次 nightly 构建（如果有新提交才会 push）
  workflow_dispatch:  # 空workflow_dispatch触发器，表示额外允许手动执行此工作流，方便调试

permissions:
  contents: write # 创建 Release 草稿

concurrency:
  group: release-${{ github.ref }}  # tag和main nightly构建各只能执行1个
  cancel-in-progress: true

jobs:
  publish-pypi-on-tag:
    timeout-minutes: 10
    name: Publish to PyPI on Tag
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/hetudb
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build the package
        run: python -m build

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1


  publish-docker-on-tag:
    timeout-minutes: 10
    name: Publish Docker and GitHub Release on Tag
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version (from tag)
        id: ver
        run: |
          # GITHUB_REF is refs/tags/v1.2.3
          ref="${GITHUB_REF#refs/tags/}"
          # Normalize: remove leading "v" for docker/tag but keep the tag string for release tagging
          norm="${ref#v}"
          echo "ref=${ref}" >> $GITHUB_OUTPUT
          echo "norm=${norm}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-shanghai.aliyuncs.com
          username: "${{ secrets.ACR_USERNAME }}"
          password: "${{ secrets.ACR_PASSWORD }}"

      # Add support for more platforms with QEMU (optional)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 启用高级构建器，稍微快一点
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            heerozh/hetu:${{ steps.ver.outputs.norm }}
            heerozh/hetu:latest
            registry.cn-shanghai.aliyuncs.com/heerozh/hetu:${{ steps.ver.outputs.norm }}
            registry.cn-shanghai.aliyuncs.com/heerozh/hetu:latest
          # 开启可验证的构建供应链安全签名
          provenance: mode=max
          # 附带 SBOM attestation
          sbom: true
          
#      - name: Generate release notes with git-cliff
#        uses: orhun/git-cliff-action@v4
#        with:
#          # 仓库中的配置文件路径
#          config: .github/cliff.toml
#          # 传给 git-cliff 的参数：针对当前 tag 生成到文件
#          args: --tag ${{ steps.ver.outputs.ref }} --output RELEASE_NOTES.md
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

#      - name: Create GitHub Release (draft)
#        uses: softprops/action-gh-release@v2
#        with:
#          draft: true
#          tag_name: ${{ steps.ver.outputs.ref }}
#          body_path: RELEASE_NOTES.md
#          generate_release_notes: false

  sync-translate-i18n:
    timeout-minutes: 15
    name: Sync and Translate i18n on Tag
    # 仅在正式版本 tag 推送时运行；与发布 job 并行，不阻塞发布
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 创建分支
      pull-requests: write  # 创建 PR
    steps:
      # 在 main 上操作，PR 以 main 为干净 base（release tag 通常即 main HEAD）
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # 从 hetu/ 源码重新抽取可翻译字符串，更新各语言 .po
      - name: Sync i18n catalogs
        run: uv run autolang sync -d ./hetu/i18n --source ./hetu/

      # 通过 API 补全未翻译条目（autolang 的 --model/--base-url/--api-key 为必填项）
      - name: Translate pending entries
        env:
          AUTOLANG_API_KEY: ${{ secrets.AUTOLANG_API_KEY }}
          AUTOLANG_BASE_URL: ${{ secrets.AUTOLANG_BASE_URL }}
          AUTOLANG_MODEL: ${{ secrets.AUTOLANG_MODEL }}
        run: >
          uv run autolang translate -d ./hetu/i18n --source ./hetu/
          --api-key "$AUTOLANG_API_KEY"
          --base-url "$AUTOLANG_BASE_URL"
          --model "$AUTOLANG_MODEL"

      # 把更新后的 .po 提交到分支并向 main 开 PR 供审核（.pot/.mo 已被 .gitignore 忽略）
      # 无改动时该 action 不会创建 PR
      - name: Create pull request for i18n updates
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          branch: chore/i18n-sync-${{ github.ref_name }}
          delete-branch: true
          add-paths: hetu/i18n/**/*.po
          commit-message: "MAINT: 同步并翻译 i18n 多国语言 (${{ github.ref_name }})"
          title: "MAINT: 同步并翻译 i18n 多国语言 (${{ github.ref_name }})"
          body: |
            由 `${{ github.ref_name }}` 发布流程自动生成。

            - `autolang sync`：从 `hetu/` 源码重新抽取可翻译字符串并更新各语言 `.po`
            - `autolang translate`：通过 API 补全未翻译条目

            请审核 AI 翻译结果后合并。翻译将随**下一次**发布生效。

  nightly_build:
    timeout-minutes: 10
    name: Nightly build and push (if new commits)
    # 仅在定时或手动触发时运行
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Check commits in last 24 hours
        id: check
        shell: bash
        run: |
          set -euo pipefail
          git fetch --prune --tags --force
          git checkout "${DEFAULT_BRANCH}"
          git pull --ff-only
          COUNT=$(git rev-list --count --since="24 hours" HEAD || echo 0)
          echo "Found $COUNT commits in last 24h on ${DEFAULT_BRANCH}"
          if [ "$COUNT" -gt 0 ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.check.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to ACR
        if: steps.check.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: registry.cn-shanghai.aliyuncs.com
          username: "${{ secrets.ACR_USERNAME }}"
          password: "${{ secrets.ACR_PASSWORD }}"

      - name: Set up QEMU
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker images
        if: steps.check.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            heerozh/hetu:latest-nightly
            registry.cn-shanghai.aliyuncs.com/heerozh/hetu:latest-nightly
          # 开启可验证的构建供应链安全签名
          provenance: mode=max
          # 附带 SBOM attestation
          sbom: true
      - name: Skip info
        if: steps.check.outputs.should_build != 'true'
        run: echo "No new commits in last 24h. Skipping nightly build."